<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
    <script>
        function validateName() {
            let name = document.getElementById("name").value;
            if (name=== "") {
                document.getElementById("nameMsg").innerHTML = "Name cannot be empty";
                return false;
            } else {
                document.getElementById("nameMsg").innerHTML = "";
                return true;
            }
        }

        function validateEmail() {
            let email = document.getElementById("email").value;
            if (!email.includes("@")) {
                document.getElementById("emailMsg").innerHTML = "Email must contain @";
                return false;
            } else {
                document.getElementById("emailMsg").innerHTML = "";
                return true;
            }
        }

        function validateAge() {
            let age = document.getElementById("age").value;
            if (age <= 18 || age === "") {
                document.getElementById("ageMsg").innerHTML = "Age must be greater than 18";
                return false;
            } else {
                document.getElementById("ageMsg").innerHTML = "";
                return true;
            }
        }

        function saveData() {
            let isNameValid = validateName();
            let isEmailValid = validateEmail();
            let isAgeValid = validateAge();

            if (isNameValid && isEmailValid && isAgeValid) {
                let user = {
                    name: document.getElementById("name").value,
                    email: document.getElementById("email").value,
                    age: document.getElementById("age").value
                };
                sessionStorage.setItem("user", JSON.stringify(user));
                document.getElementById("result").innerHTML = "Data stored in sessionStorage";
            } else {
                document.getElementById("result").innerHTML = "Please fix errors before submitting";
            }
        }
    </script>
</head>
<body>

<h2>Registration Form</h2>

Name: <input type="text" id="name" onchange="validateName()">
<span id="nameMsg"></span>
<br><br>

Email: <input type="text" id="email" onchange="validateEmail()">
<span id="emailMsg"></span>
<br><br>

Age: <input type="number" id="age" onchange="validateAge()">
<span id="ageMsg"></span>
<br><br>

<button onclick="saveData()">Submit</button>

<p id="result"></p>

</body>
</html>

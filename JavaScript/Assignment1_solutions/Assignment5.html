<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
    <body>

        <script>
            let num = 7;

            let posNeg = (num >= 0) ? "Positive" : "Negative";
            console.log("Number is: " + posNeg);

            if (num % 2 === 0) {
                console.log("Number is Even");
            } else {
                console.log("Number is Odd");
            }

            console.log("Numbers from 1 to " + num + ":");
            for (let i = 1; i <= num; i++) {
                console.log(i);
            }
        </script>

    </body>
</html>
